<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lic. Guillermo Díaz Ramírez | Abogado</title>
    
    <!-- Metadatos para que WhatsApp muestre una vista previa profesional -->
    <meta property="og:title" content="Lic. Guillermo Díaz Ramírez">
    <meta property="og:description" content="Contacto Profesional - Abogado Postulante en Puebla.">
    <meta property="og:image" content="https://placehold.co/600x400/020617/c5a059?text=GD">
    
    <!-- Librerías de diseño (CDNs gratuitos) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        law: {
                            text: '#f8fafc',
                            bg: '#020617',
                            accent: '#c5a059', // Dorado elegante
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            background-image: radial-gradient(#ffffff05 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .animate-in {
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Estilo para simular relieve en el logo */
        .logo-shadow {
            box-shadow: 0 10px 25px -5px rgba(197, 160, 89, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm glass-card rounded-[2.5rem] overflow-hidden animate-in shadow-2xl">
        <!-- Borde dorado superior -->
        <div class="h-1.5 bg-law-accent"></div>

        <div class="p-8 text-center">
            <!-- Logo / Monograma -->
            <div class="mb-6 flex justify-center">
                <div class="w-24 h-24 bg-white rounded-3xl flex items-center justify-center logo-shadow border-2 border-law-accent/30">
                    <svg viewBox="0 0 100 100" class="w-16 h-16" xmlns="http://www.w3.org/2000/svg">
                        <g fill="none" stroke="#0f172a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M70,35 C70,25 60,20 50,20 C30,20 15,35 15,50 C15,65 30,80 50,80 L70,80 C75,80 80,75 80,70 L80,55 L55,55" />
                            <path d="M45,30 L45,70 C45,70 75,70 75,50 C75,30 45,30 45,30 Z" />
                        </g>
                    </svg>
                </div>
            </div>

            <!-- Nombre y Título -->
            <h1 class="text-2xl font-bold text-white mb-1 tracking-tight">Guillermo Díaz Ramírez</h1>
            <p class="text-law-accent uppercase tracking-[0.3em] text-[10px] font-semibold mb-6">Abogado Postulante</p>

            <!-- Botones de contacto directo -->
            <div class="space-y-3">
                <!-- WhatsApp -->
                <a href="https://wa.me/529636333087" target="_blank" class="flex items-center p-4 bg-white/5 hover:bg-white/10 rounded-2xl border border-white/5 transition-all group active:scale-95">
                    <div class="p-2.5 bg-green-500/20 rounded-xl group-hover:scale-110 transition-transform">
                        <i data-lucide="message-circle" class="w-5 h-5 text-green-500"></i>
                    </div>
                    <div class="ml-4 text-left">
                        <p class="text-[10px] text-gray-400 uppercase font-medium">WhatsApp</p>
                        <p class="text-sm font-semibold text-white">963 633 3087</p>
                    </div>
                </a>

                <!-- Llamada Oficina -->
                <a href="tel:2229521384" class="flex items-center p-4 bg-white/5 hover:bg-white/10 rounded-2xl border border-white/5 transition-all group active:scale-95">
                    <div class="p-2.5 bg-law-accent/20 rounded-xl group-hover:scale-110 transition-transform">
                        <i data-lucide="phone" class="w-5 h-5 text-law-accent"></i>
                    </div>
                    <div class="ml-4 text-left">
                        <p class="text-[10px] text-gray-400 uppercase font-medium">Oficina</p>
                        <p class="text-sm font-semibold text-white">222 952 1384</p>
                    </div>
                </a>

                <!-- Guardar Contacto -->
                <button onclick="downloadVCard()" class="w-full flex items-center p-4 bg-white/5 hover:bg-white/10 rounded-2xl border border-white/5 transition-all group active:scale-95">
                    <div class="p-2.5 bg-blue-500/20 rounded-xl group-hover:scale-110 transition-transform">
                        <i data-lucide="user-plus" class="w-5 h-5 text-blue-500"></i>
                    </div>
                    <div class="ml-4 text-left">
                        <p class="text-[10px] text-gray-400 uppercase font-medium">Agenda</p>
                        <p class="text-sm font-semibold text-white">Guardar en Contactos</p>
                    </div>
                </button>

                <!-- Ubicación -->
                <a href="https://www.google.com/maps/search/?api=1&query=9+sur+2310+Chulavista+Puebla" target="_blank" class="flex items-center p-4 bg-white/5 hover:bg-white/10 rounded-2xl border border-white/5 transition-all group active:scale-95">
                    <div class="p-2.5 bg-red-500/20 rounded-xl group-hover:scale-110 transition-transform">
                        <i data-lucide="map-pin" class="w-5 h-5 text-red-500"></i>
                    </div>
                    <div class="ml-4 text-left">
                        <p class="text-[10px] text-gray-400 uppercase font-medium">Ubicación</p>
                        <p class="text-xs text-white/90">Chulavista, Puebla</p>
                    </div>
                </a>
            </div>

            <!-- Botón Compartir enlace -->
            <button onclick="shareLink()" class="mt-8 w-full py-4 bg-law-accent text-slate-950 font-bold rounded-2xl shadow-lg hover:bg-[#b08d4a] transition-all active:scale-95 flex items-center justify-center gap-2">
                <i data-lucide="share-2" class="w-4 h-4"></i>
                Compartir Tarjeta
            </button>
        </div>

        <footer class="pb-6 text-center">
            <p class="text-[9px] text-gray-500 uppercase tracking-[0.4em] font-medium">Excelencia Jurídica</p>
        </footer>
    </div>

    <script>
        // Inicializar iconos de Lucide
        lucide.createIcons();

        // Función para generar y descargar archivo vCard (.vcf)
        function downloadVCard() {
            const vCardData = `BEGIN:VCARD
VERSION:3.0
FN:Lic. Guillermo Díaz Ramírez
ORG:Estudio Jurídico
TEL;TYPE=CELL:9636333087
TEL;TYPE=WORK:2229521384
ADR;TYPE=WORK:;;9 sur 2310;Puebla;Chulavista;72000;Mexico
TITLE:Abogado Postulante
END:VCARD`;
            const blob = new Blob([vCardData], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Guillermo_Diaz_Ramirez.vcf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // Función nativa para compartir el enlace
        async function shareLink() {
            const shareData = {
                title: 'Lic. Guillermo Díaz Ramírez',
                text: 'Te comparto mi tarjeta digital de contacto.',
                url: window.location.href
            };

            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (err) {
                    console.log('Compartido cancelado');
                }
            } else {
                // Si el navegador no soporta compartir, copiamos al portapapeles
                try {
                    await navigator.clipboard.writeText(window.location.href);
                    alert("Enlace copiado al portapapeles");
                } catch (err) {
                    const tempInput = document.createElement('input');
                    tempInput.value = window.location.href;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand('copy');
                    document.body.removeChild(tempInput);
                    alert("Enlace copiado");
                }
            }
        }
    </script>
</body>
</html>
